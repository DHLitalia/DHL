<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f5f5;
}

.main{
  padding:50px 20px;
  max-width:550px;
  margin:auto;
  text-align:center;
}

h2{
  margin-bottom:5px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border:2px solid #ddd;
  border-radius:10px;
  font-size:15px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#ffcc00;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* CARD */
.card{
  margin-top:20px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:left;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:14px;
}

td{
  padding:8px;
  border-bottom:1px solid #eee;
}

td:first-child{
  font-weight:bold;
  width:40%;
}

/* TRACK */
.track{
  position:relative;
  height:10px;
  background:#ddd;
  border-radius:20px;
  margin:20px 0;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#00e676);
}

.truck{
  position:absolute;
  top:-25px;
  right:0%;
  font-size:20px;
}

/* DELIVERY */
.delivery-box{
  margin-top:15px;
  padding:15px;
  border-left:5px solid #00c853;
  background:#fff;
  border-radius:10px;
}

/* ADMIN */
#admin{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  color:#fff;
  padding:15px;
  display:none;
}

/* DHL BUTTON */
#dhlBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  background:#ffcc00;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="main">

<h2>DHL TRACKING SYSTEM</h2>

<input id="searchCode" placeholder="Tracking Code">
<button onclick="search()">TRACK</button>

<div id="result"></div>

</div>

<!-- ADMIN -->
<div id="admin">

<h3>ADMIN</h3>

<input id="nome" placeholder="Name">
<input id="cognome" placeholder="Surname">
<input id="indirizzo" placeholder="Address">
<input id="gmail" placeholder="Email">
<input id="telefono" placeholder="Phone">

<button onclick="createShipment()">Create Shipment</button>

<hr>

<input id="adminSearch" placeholder="Code">

<select id="adminStatus">
  <option value="running">Running</option>
  <option value="stopped">Stopped</option>
  <option value="recivuto">Delivered</option>
</select>

<button onclick="applyAdmin()">Update</button>

</div>

<button id="dhlBtn">DHL</button>

<script>

let shipments = JSON.parse(localStorage.getItem("shipments")) || {};

/* GENERATE */
function generateCode(){
  return "JD" + Date.now();
}

/* CREATE */
function createShipment(){

  let code = generateCode();

  shipments[code] = {
    code,
    nome: nome.value,
    cognome: cognome.value,
    indirizzo: indirizzo.value,
    gmail: gmail.value,
    telefono: telefono.value,
    createdAt: Date.now(),
    status: "running"
  };

  save();
  alert(code);
}

/* SAVE */
function save(){
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

/* SEARCH */
function search(){

  let code = searchCode.value.trim();
  let s = shipments[code];

  if(!s){
    result.innerHTML = "Not Found";
    return;
  }

  show(s);
}

/* SHOW */
function show(s){

  result.innerHTML = `
  <div class="card">

    <h3>DHL EXPRESS</h3>

    <table>

      <tr><td>Tracking</td><td>${s.code}</td></tr>
      <tr><td>Origin</td><td>Sharm El Sheikh, Egypt</td></tr>
      <tr><td>Destination</td><td>Italy</td></tr>
      <tr><td>Importo</td><td>10€</td></tr>
      <tr><td>Customer</td><td>${s.nome} ${s.cognome}</td></tr>
      <tr><td>Address</td><td>${s.indirizzo}</td></tr>
      <tr><td>Email</td><td>${s.gmail}</td></tr>
      <tr><td>Phone</td><td>${s.telefono}</td></tr>

    </table>

    <div class="track">
      <div class="progress" id="bar_${s.code}"></div>
      <div class="truck" id="truck_${s.code}">🚚</div>
    </div>

    <div id="status_${s.code}"></div>

  </div>
  `;

  moveTruck(s.code);
}

/* TRACKING */
function moveTruck(code){

  function update(){

    let s = shipments[code];
    if(!s) return;

    let hours = (Date.now() - s.createdAt) / 3600000;
    let day = Math.floor(hours / 24);

    if(day > 5) day = 5;

    let progress = (day / 5) * 100;
    let position = 100 - progress;

    const truck = document.getElementById("truck_" + code);
    const bar = document.getElementById("bar_" + code);
    const status = document.getElementById("status_" + code);

    if(s.status === "stopped"){
      status.innerHTML = "Shipment Suspended";
      return;
    }

    if(day >= 5){
      s.status = "recivuto";
      save();
    }

    if(s.status === "recivuto"){

      truck.style.right = "0%";
      bar.style.width = "100%";

      status.innerHTML = `
      Delivery completed<br>
      Consegna completata con successo
      `;

      result.innerHTML += `
        <div class="delivery-box">
          Shipment delivered successfully in Italy.
        </div>
      `;

      return;
    }

    truck.style.right = position + "%";
    bar.style.width = progress + "%";
    status.innerHTML = "In Transit";

    requestAnimationFrame(update);
  }

  update();
}

/* ADMIN */
function applyAdmin(){

  let code = adminSearch.value.trim();
  let s = shipments[code];

  if(!s) return;

  s.status = adminStatus.value;

  save();

  alert("Updated");
}

/* SECRET */
let clicks = 0;

document.getElementById("dhlBtn").addEventListener("click", ()=>{

  clicks++;

  if(clicks >= 10){
    let pass = prompt("Password:");
    if(pass === "200911"){
      document.getElementById("admin").style.display = "block";
    }
    clicks = 0;
  }

});

</script>

</body>
</html>
