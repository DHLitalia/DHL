<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:650px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

/* SEARCH */
.search-box{
  position:relative;
  margin-top:20px;
}

#searchInput{
  width:100%;
  padding:15px 50px 15px 15px;
  font-size:16px;
  border:2px solid #ffcc00;
  border-radius:10px;
  outline:none;
}

.search-btn{
  position:absolute;
  right:5px;
  top:5px;
  height:85%;
  width:45px;
  border:none;
  background:#ffcc00;
  border-radius:8px;
  cursor:pointer;
}

/* RESULT */
.result{
  display:none;
  margin-top:20px;
  text-align:left;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* TRACK */
.track-line{
  position:relative;
  height:12px;
  background:#ddd;
  border-radius:20px;
  margin:20px 0;
  overflow:visible;
}

.progress{
  height:100%;
  background:#28a745;
  width:0%;
  transition:width 1s linear;
}

/* 🚚 TRUCK */
.truck{
  position:absolute;
  top:-35px;
  font-size:52px;
  transform:translateX(-50%);
  transition:left 1.5s ease-in-out;
  will-change:left;
}

/* BUTTON */
.dhl-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  font-size:24px;
  cursor:pointer;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="container">

<h2>DHL Tracking System</h2>

<div class="search-box">
<input id="searchInput" placeholder="DJXXXXXXXXXXXX">
<button class="search-btn" onclick="searchTracking()">Search</button>
</div>

<div id="result" class="result"></div>

</div>

<button class="dhl-btn" onclick="dhlClick()">DHL</button>

<!-- ADMIN -->
<div class="admin" id="admin">

<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Nome e Cognome">
<input id="phone" placeholder="Numero telefono">
<input id="address" placeholder="Indirizzo">
<input id="gmail" placeholder="Gmail">
<input id="price" placeholder="Prezzo €">

<button onclick="addShipment()">Add Shipment</button>

</div>

</div>

<script>

let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];

let clicks = 0;
const PASSWORD = "200911";

/* ADMIN */
function dhlClick(){
  clicks++;
  if(clicks < 10) return;

  clicks = 0;

  const p = prompt("Password:");
  if((p || "").trim() === PASSWORD){
    document.getElementById("admin").style.display = "flex";
  } else {
    alert("Wrong password");
  }
}

/* ADD */
function addShipment(){

  const code = "DJ" + Math.floor(1000000000000000 + Math.random() * 9000000000000000);

  shipments.unshift({
    code,
    fullname: document.getElementById("fullname").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    gmail: document.getElementById("gmail").value,
    price: document.getElementById("price").value,
    createdAt: Date.now()
  });

  localStorage.setItem("dhlShipments", JSON.stringify(shipments));

  alert("Added: " + code);
}

/* SEARCH */
function searchTracking(){

  const code = document.getElementById("searchInput").value.toUpperCase().trim();
  const result = document.getElementById("result");

  const s = shipments.find(x => x.code === code);

  if(!s){
    result.style.display = "block";
    result.innerHTML = "Not Found";
    return;
  }

  let passedDays = Math.floor((Date.now() - s.createdAt) / 86400000);
  if(passedDays > 6) passedDays = 6;

  let progress = (passedDays / 6) * 100;

  /* 🚚 ما يرجعش لور */
  if(!window.maxProgress) window.maxProgress = 0;
  if(progress > window.maxProgress){
    window.maxProgress = progress;
  }
  progress = window.maxProgress;

  result.style.display = "block";

  result.innerHTML = `

  <h2>DHL Tracking System</h2>

  <p>Status: In Transit</p>
  <p>Code: ${s.code}</p>

  <p>Sharm El Sheikh - Italia (Road Transport)</p>

  <p>Day ${passedDays}/6</p>

  <div class="track-line">
    <div class="progress" style="width:${progress}%"></div>
    <div class="truck" style="left:${progress}%">🚚</div>
  </div>

  <p>Progress: ${Math.floor(progress)}%</p>

  <hr>

  <p>${s.fullname}</p>
  <p>${s.phone}</p>
  <p>${s.address}</p>
  <p>${s.gmail}</p>
  <p>${s.price} €</p>

  `;
}

</script>

</body>
</html>
