<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:650px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

/* SEARCH */
.search-box{
  position:relative;
  margin-top:20px;
}

#searchInput{
  width:100%;
  padding:15px;
  font-size:16px;
  border:2px solid #ffcc00;
  border-radius:10px;
}

.search-btn{
  position:absolute;
  right:5px;
  top:5px;
  height:85%;
  width:45px;
  border:none;
  background:#ffcc00;
  border-radius:8px;
  cursor:pointer;
}

/* RESULT */
.result{
  display:none;
  margin-top:20px;
  text-align:left;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* TRACK */
.track-line{
  position:relative;
  height:12px;
  background:#ddd;
  border-radius:20px;
  margin:20px 0;
  overflow:visible;
}

.progress{
  height:100%;
  background:#28a745;
  width:0%;
}

/* 🚚 TRUCK */
.truck{
  position:absolute;
  top:-30px;
  font-size:45px;
  transform:translateX(-50%) scaleX(-1);
  transition:left 1s linear;
  z-index:10;
}

/* BUTTON */
.dhl-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  font-size:24px;
  cursor:pointer;
  font-weight:bold;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}

/* RECEIPT */
.receipt{
  margin-top:20px;
  padding:15px;
  border:2px dashed #333;
  border-radius:10px;
  background:#fafafa;
}
</style>
</head>

<body>

<div class="container">

<h2>DHL Tracking System</h2>

<div class="search-box">
<input id="searchInput" placeholder="DJXXXXXXXXXXXX">
<button class="search-btn" onclick="searchTracking()">Search</button>
</div>

<div id="result" class="result"></div>

</div>

<button class="dhl-btn" onclick="dhlClick()">DHL</button>

<!-- ADMIN -->
<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="gmail" placeholder="Gmail">
<input id="price" placeholder="Price €">

<button onclick="addShipment()">Add Shipment</button>

</div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];
let clicks = 0;
const PASSWORD = "200911";

/* ADMIN 10 CLICKS */
function dhlClick(){
  clicks++;
  if(clicks < 10) return;
  clicks = 0;

  const p = prompt("Password:");
  if((p || "").trim() === PASSWORD){
    document.getElementById("admin").style.display = "flex";
  } else {
    alert("Wrong password");
  }
}

/* ADD */
function addShipment(){

  const code = "DJ" + Math.floor(1000000000000000 + Math.random()*9000000000000000);

  shipments.unshift({
    code,
    fullname: fullname.value,
    phone: phone.value,
    address: address.value,
    gmail: gmail.value,
    price: price.value,
    createdAt: Date.now()
  });

  localStorage.setItem("dhlShipments", JSON.stringify(shipments));

  alert("Added: " + code);
}

/* RECEIPT */
function showReceipt(s){
  return `
  <div class="receipt">
    <h3>RECEIPT</h3>
    <p><b>Code:</b> ${s.code}</p>
    <p><b>Name:</b> ${s.fullname}</p>
    <p><b>Phone:</b> ${s.phone}</p>
    <p><b>Address:</b> ${s.address}</p>
    <p><b>Email:</b> ${s.gmail}</p>
    <p><b>Price:</b> ${s.price} €</p>
  </div>
  `;
}

/* SEARCH + TRACK + TRUCK */
function searchTracking(){

  const code = searchInput.value.toUpperCase().trim();
  const result = document.getElementById("result");

  const s = shipments.find(x => x.code === code);

  if(!s){
    result.style.display = "block";
    result.innerHTML = "Not Found";
    return;
  }

  let days = Math.min(6, Math.floor((Date.now()-s.createdAt)/86400000));
  let progress = (days/6)*100;

  result.style.display = "block";

  result.innerHTML = `
    <h2>DHL Tracking System</h2>

    <p>Status: In Transit</p>
    <p>Code: ${s.code}</p>

    <p>Day ${days}/6</p>

    <div class="track-line">
      <div class="progress" style="width:${progress}%"></div>
      <div class="truck" id="truck">🚚</div>
    </div>

    <p>${Math.floor(progress)}%</p>

    ${showReceipt(s)}
  `;

  setTimeout(()=>{
    document.getElementById("truck").style.left = progress + "%";
  }, 50);
}

</script>

</body>
</html>
