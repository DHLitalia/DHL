<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

.main{
  max-width:550px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#ffcc00;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  margin-top:20px;
  border-radius:12px;
  text-align:left;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

td{
  padding:8px;
  border-bottom:1px solid #eee;
}

td:first-child{
  font-weight:bold;
  width:40%;
}

/* TRACK */
.track{
  position:relative;
  height:10px;
  background:#ddd;
  border-radius:20px;
  margin:20px 0;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#00e676);
}

/* 🚚 */
.truck{
  position:absolute;
  top:-25px;
  left:0%;
  font-size:22px;
}

/* ADMIN PANEL */
#admin{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  color:#fff;
  padding:15px;
  display:none;
  overflow:auto;
  z-index:999;
}

/* CLOSE BUTTON */
.closeBtn{
  background:#ff4444;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:10px;
}

/* DHL BUTTON */
#adminToggle{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ffcc00;
  color:#111;
  font-weight:bold;
  padding:12px 18px;
  border-radius:25px;
  cursor:pointer;
  z-index:1000;
}
</style>
</head>

<body>

<div class="main">

<h2>DHL TRACKING SYSTEM</h2>

<input id="searchCode" placeholder="Tracking Code">
<button onclick="search()">TRACK</button>

<div id="result"></div>

</div>

<!-- ADMIN -->
<div id="admin">

<button class="closeBtn" onclick="closeAdmin()">Close Panel</button>

<h3>ADMIN PANEL</h3>

<input id="nome" placeholder="Name">
<input id="cognome" placeholder="Surname">
<input id="indirizzo" placeholder="Address">
<input id="gmail" placeholder="Email">
<input id="telefono" placeholder="Phone">

<button onclick="createShipment()">Create Shipment</button>

<hr>

<input id="adminSearch" placeholder="Code">

<select id="adminStatus">
  <option value="running">Running</option>
  <option value="stopped">Stopped</option>
</select>

<button onclick="applyAdmin()">Update</button>

</div>

<!-- DHL BUTTON -->
<div id="adminToggle">DHL</div>

<script>

let shipments = JSON.parse(localStorage.getItem("shipments")) || {};

/* CREATE CODE */
function generateCode(){
  return "JD" + Date.now();
}

/* CREATE SHIPMENT */
function createShipment(){

  let code = generateCode();

  shipments[code] = {
    code,
    nome: nome.value,
    cognome: cognome.value,
    indirizzo: indirizzo.value,
    gmail: gmail.value,
    telefono: telefono.value,
    createdAt: Date.now(),
    status: "running"
  };

  save();
  alert(code);
}

/* SAVE */
function save(){
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

/* SEARCH */
function search(){

  let code = searchCode.value.trim();
  let s = shipments[code];

  if(!s){
    result.innerHTML = "Not Found";
    return;
  }

  show(s);
}

/* SHOW */
function show(s){

  result.innerHTML = `
  <div class="card">

    <h3>DHL EXPRESS</h3>

    <table>
      <tr><td>Tracking</td><td>${s.code}</td></tr>
      <tr><td>Origin</td><td>Sharm El Sheikh</td></tr>
      <tr><td>Destination</td><td>Italy</td></tr>
      <tr><td>Name</td><td>${s.nome} ${s.cognome}</td></tr>
      <tr><td>Email</td><td>${s.gmail}</td></tr>
      <tr><td>Phone</td><td>${s.telefono}</td></tr>
    </table>

    <div class="track">
      <div class="progress" id="bar_${s.code}"></div>
      <div class="truck" id="truck_${s.code}">🚚</div>
    </div>

    <div id="status_${s.code}"></div>

  </div>
  `;

  moveTruck(s.code);
}

/* TRACK */
function moveTruck(code){

  let progress = 0;
  let direction = 1;

  function update(){

    let s = shipments[code];
    if(!s) return;

    const truck = document.getElementById("truck_" + code);
    const bar = document.getElementById("bar_" + code);
    const status = document.getElementById("status_" + code);

    if(s.status === "stopped"){
      status.innerHTML = "Stopped";
      return;
    }

    progress += direction * 0.5;

    if(progress >= 100){
      progress = 100;
      direction = -1;
    }

    if(progress <= 0 && direction === -1){
      progress = 0;
      direction = 0;
      status.innerHTML = "Stopped at Start";
    } else {
      status.innerHTML = "In Transit";
    }

    let position = 100 - progress;

    truck.style.left = position + "%";
    bar.style.width = progress + "%";

    if(direction !== 0){
      requestAnimationFrame(update);
    }
  }

  update();
}

/* ADMIN */
function applyAdmin(){

  let code = adminSearch.value.trim();
  let s = shipments[code];

  if(!s) return;

  s.status = adminStatus.value;

  save();

  alert("Updated");
}

/* CLOSE PANEL */
function closeAdmin(){
  document.getElementById("admin").style.display = "none";
  open = false;
  clicks = 0;
}

/* OPEN PANEL (10 clicks + password) */
let clicks = 0;
let open = false;

document.getElementById("adminToggle").addEventListener("click", () => {

  clicks++;

  if(clicks < 10) return;

  let pass = prompt("Password:");

  if(pass === "200911"){
    open = !open;
    document.getElementById("admin").style.display = open ? "block" : "none";
  }

  clicks = 0;
});

</script>

</body>
</html>
