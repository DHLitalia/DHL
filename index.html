<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

.main{
  padding:20px;
  max-width:600px;
  margin:auto;
  text-align:center;
}

input,button,select{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  background:#ffcc00;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

.track{
  position:relative;
  height:12px;
  background:#ddd;
  border-radius:20px;
  margin:20px 0;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#00e676);
}

.truck{
  position:absolute;
  top:-28px;
  left:0%;
  font-size:22px;
}

/* ADMIN PANEL */
#admin{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  color:#fff;
  padding:15px;
  overflow:auto;
  display:none;
}

/* 🔘 DHL BUTTON (CIRCLE) */
#dhlBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  background:#ffcc00;
  color:#111;
  font-weight:bold;
  border:none;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<!-- CLIENT -->
<div class="main">

<h2>📦 DHL Tracking System</h2>

<input id="searchCode" placeholder="Enter Tracking Code">
<button onclick="search()">SEARCH</button>

<div id="result"></div>

</div>

<!-- ADMIN PANEL -->
<div id="admin">

<h3>🛠 Admin Panel</h3>

<input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">
<input id="indirizzo" placeholder="Indirizzo">

<button onclick="createShipment()">➕ Create Shipment</button>

<hr>

<h4>🔍 Manage Tracking</h4>

<input id="adminSearch" placeholder="Tracking Code">

<select id="adminStatus">
  <option value="running">🚚 Running</option>
  <option value="stopped">⛔ Stop</option>
  <option value="recivuto">📦 Recivuto</option>
</select>

<input type="date" id="adminDate">

<button onclick="applyAdmin()">Apply Control</button>

</div>

<!-- 🔘 DHL BUTTON -->
<button id="dhlBtn">DHL</button>

<script>

let shipments = JSON.parse(localStorage.getItem("shipments")) || {};

/* 🔑 GENERATE CODE */
function generateCode(){
  return "JD" + Date.now() + Math.floor(Math.random()*1000);
}

/* ➕ CREATE SHIPMENT */
function createShipment(){

  let code = generateCode();

  shipments[code] = {
    code,
    nome: nome.value,
    cognome: cognome.value,
    indirizzo: indirizzo.value,
    createdAt: Date.now(),
    status: "running"
  };

  save();

  alert("Created: " + code);
}

/* 💾 SAVE */
function save(){
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

/* 🔍 SEARCH */
function search(){

  let code = searchCode.value.trim();

  let s = shipments[code];

  if(!s){
    result.innerHTML = "❌ Not Found";
    return;
  }

  show(s);
}

/* 📦 SHOW */
function show(s){

  result.innerHTML = `
  <div class="card">

    <h3>DHL EXPRESS</h3>
    <p><b>${s.code}</b></p>

    <div class="track">
      <div class="progress" id="bar_${s.code}"></div>
      <div class="truck" id="truck_${s.code}">🚚</div>
    </div>

    <p>${s.nome} ${s.cognome}</p>
    <p>${s.indirizzo}</p>

    <div id="status_${s.code}" style="font-weight:bold;color:red"></div>

  </div>
  `;

  moveTruck(s.code);
}

/* 🚚 MOVE TRACK */
function moveTruck(code){

  const truck = document.getElementById("truck_" + code);
  const bar = document.getElementById("bar_" + code);
  const status = document.getElementById("status_" + code);

  function update(){

    let s = shipments[code];
    if(!s) return;

    let hours = (Date.now() - s.createdAt) / 3600000;
    let day = Math.floor(hours / 24);

    let progress = (day / 6) * 100;
    if(progress > 100) progress = 100;

    if(s.status === "stopped"){
      status.innerHTML = "⚠️ Suspended";
      truck.style.left = progress + "%";
      bar.style.width = progress + "%";
      return;
    }

    if(s.status === "recivuto"){
      truck.style.left = "100%";
      bar.style.width = "100%";
      status.innerHTML = "📦 Delivered";
      return;
    }

    truck.style.left = progress + "%";
    bar.style.width = progress + "%";

    requestAnimationFrame(update);
  }

  update();
}

/* 🛠 ADMIN CONTROL */
function applyAdmin(){

  let code = adminSearch.value.trim();
  let status = adminStatus.value;
  let date = adminDate.value;

  let s = shipments[code];

  if(!s){
    alert("Not found");
    return;
  }

  s.status = status;

  if(date){
    s.createdAt = new Date(date).getTime();
  }

  save();

  alert("Updated ✔");
}

/* 🔐 SECRET DHL BUTTON (10 clicks) */
let clicks = 0;
let unlocked = false;

document.getElementById("dhlBtn").addEventListener("click", function(){

  clicks++;

  if(clicks >= 10 && !unlocked){

    let pass = prompt("🔐 Enter password:");

    if(pass === "200911"){
      document.getElementById("admin").style.display = "block";
      alert("✔ Admin Unlocked");
      unlocked = true;
    } else {
      alert("❌ Wrong Password");
      clicks = 0;
    }
  }
});

</script>

</body>
</html>
