<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:650px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

.search-box{
  position:relative;
  margin-top:20px;
}

#searchInput{
  width:100%;
  padding:15px 50px 15px 15px;
  font-size:16px;
  border:2px solid #ffcc00;
  border-radius:10px;
  outline:none;
}

.search-btn{
  position:absolute;
  right:5px;
  top:5px;
  height:85%;
  width:45px;
  border:none;
  background:#ffcc00;
  border-radius:8px;
  cursor:pointer;
}

.result{
  display:none;
  margin-top:20px;
  text-align:left;
}

.dhl-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  font-size:24px;
  cursor:pointer;
  font-weight:bold;
}

.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>DHL Tracking System</h2>

<div class="search-box">
<input id="searchInput" placeholder="JDXXXXXXXXXXXXXXX">
<button class="search-btn" onclick="searchTracking()">Search</button>
</div>

<div id="result" class="result"></div>

</div>

<button class="dhl-btn" onclick="dhlClick()">DHL</button>

<!-- ADMIN -->
<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Nome e Cognome">
<input id="phone" placeholder="Numero telefono">
<input id="address" placeholder="Indirizzo">
<input id="gmail" placeholder="Gmail">
<input id="price" placeholder="Prezzo €">

<button onclick="addShipment()">Add Shipment</button>

</div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];

let clicks = 0;
const PASSWORD = "200911";

/* ADMIN */
function dhlClick(){
  clicks++;
  if(clicks < 10) return;

  clicks = 0;

  const p = prompt("Password:");
  if((p || "").trim() === PASSWORD){
    document.getElementById("admin").style.display = "flex";
  }else{
    alert("Wrong password");
  }
}

/* CODE JD */
function generateCode(){
  return "JD" + Math.floor(1000000000000000 + Math.random() * 9000000000000000);
}

/* ADD */
function addShipment(){

  const code = generateCode();

  shipments.unshift({
    code,
    fullname: document.getElementById("fullname").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    gmail: document.getElementById("gmail").value,
    price: document.getElementById("price").value,
    createdAt: Date.now()
  });

  localStorage.setItem("dhlShipments", JSON.stringify(shipments));

  alert("Added: " + code);
}

/* SEARCH + RECEIPT */
function searchTracking(){

  const code = document.getElementById("searchInput").value.toUpperCase();
  const result = document.getElementById("result");

  const s = shipments.find(x => x.code === code);

  if(!s){
    result.style.display = "block";
    result.innerHTML = "❌ Shipment Not Found";
    return;
  }

  const date = new Date().toLocaleDateString();

  result.style.display = "block";

  result.innerHTML = `

  <div style="background:#fff;padding:20px;border-radius:15px;box-shadow:0 10px 20px rgba(0,0,0,0.2);">

    <h2 style="text-align:center;color:#ffcc00;">DHL RECEIPT</h2>

    <table style="width:100%;border-collapse:collapse;margin-top:15px;font-size:15px;">

      <tr>
        <td style="border:1px solid #ddd;padding:10px;"><b>Nome</b></td>
        <td style="border:1px solid #ddd;padding:10px;">${s.fullname}</td>
      </tr>

      <tr>
        <td style="border:1px solid #ddd;padding:10px;"><b>Indirizzo</b></td>
        <td style="border:1px solid #ddd;padding:10px;">${s.address}</td>
      </tr>

      <tr>
        <td style="border:1px solid #ddd;padding:10px;"><b>Gmail</b></td>
        <td style="border:1px solid #ddd;padding:10px;">${s.gmail}</td>
      </tr>

      <tr>
        <td style="border:1px solid #ddd;padding:10px;"><b>Numero telefono</b></td>
        <td style="border:1px solid #ddd;padding:10px;">${s.phone}</td>
      </tr>

      <tr>
        <td style="border:1px solid #ddd;padding:10px;"><b>Importo</b></td>
        <td style="border:1px solid #ddd;padding:10px;">${s.price} €</td>
      </tr>

      <tr>
        <td style="border:1px solid #ddd;padding:10px;"><b>Data</b></td>
        <td style="border:1px solid #ddd;padding:10px;">${date}</td>
      </tr>

      <tr>
        <td style="border:1px solid #ddd;padding:10px;"><b>Tracking Code</b></td>
        <td style="border:1px solid #ddd;padding:10px;">${s.code}</td>
      </tr>

    </table>

    <p style="text-align:center;margin-top:15px;color:green;font-weight:bold;">
      ✔ Ricevuta generata automaticamente
    </p>

  </div>

  `;
}

</script>

</body>
</html>
