<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

.main{
  padding:20px;
  max-width:600px;
  margin:auto;
  text-align:center;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  background:#ffcc00;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

.track{
  position:relative;
  height:12px;
  background:#ddd;
  border-radius:20px;
  margin:20px 0;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#00e676);
}

.truck{
  position:absolute;
  top:-28px;
  left:0%;
  font-size:22px;
}

/* DHL BUTTON */
#dhlBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  font-weight:bold;
}

/* ADMIN */
#admin{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  color:#fff;
  padding:15px;
  transition:0.3s;
  overflow:auto;
}

#admin.open{
  right:0;
}

#admin input{
  width:100%;
  padding:8px;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- CLIENT -->
<div class="main">

<h2>📦 Tracking System</h2>

<input id="searchCode" placeholder="Enter Tracking Code">
<button onclick="search()">SEARCH</button>

<div id="result"></div>

</div>

<!-- SECRET BUTTON -->
<button id="dhlBtn" onclick="dhlClick()">DHL</button>

<!-- ADMIN PANEL -->
<div id="admin">

<h3>🛠 Admin Panel</h3>

<input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">
<input id="indirizzo" placeholder="Indirizzo">
<input id="gmail" placeholder="Gmail">
<input id="numero" placeholder="Numero">

<button onclick="createShipment()">➕ Create Shipment</button>

<hr>

<h4>🎛 Control</h4>

<input id="pos" type="range" min="0" max="100">

<button onclick="setManual()">✋ Manual</button>
<button onclick="setAuto()">🤖 Auto</button>

</div>

<script>

let shipments = JSON.parse(localStorage.getItem("shipments")) || {};

let clicks = 0;
let locked = false;

let auto = true;
let manualProgress = 0;

/* 🔐 SECRET DHL BUTTON */
function dhlClick(){

  if(locked) return;

  clicks++;
  if(clicks < 10) return;

  clicks = 0;
  locked = true;

  setTimeout(()=> locked = false, 3000);

  let pass = prompt("Enter Admin Password:");

  if(pass === "200911"){
    document.getElementById("admin").classList.add("open");
  }else{
    alert("Wrong password ❌");
  }
}

/* 🔑 TRACKING CODE GENERATOR */
function generateCode(){
  return "JD" + Date.now() + Math.floor(Math.random()*1000);
}

/* ➕ CREATE SHIPMENT */
function createShipment(){

  let code = generateCode();

  shipments[code] = {
    code,
    nome: nome.value,
    cognome: cognome.value,
    indirizzo: indirizzo.value,
    gmail: gmail.value,
    numero: numero.value,
    createdAt: Date.now(),
    status: "running"
  };

  localStorage.setItem("shipments", JSON.stringify(shipments));

  alert("Tracking Created: " + code);
}

/* 🔍 SEARCH */
function search(){

  let code = searchCode.value.trim();

  let s = shipments[code];

  if(!s){
    result.innerHTML = "❌ Not Found";
    return;
  }

  show(s);
}

/* 📦 SHOW */
function show(s){

  result.innerHTML = `
  <div class="card">

    <h3>DHL EXPRESS</h3>

    <p><b>${s.code}</b></p>

    <div class="track">
      <div class="progress" id="bar_${s.code}"></div>
      <div class="truck" id="truck_${s.code}">🚚</div>
    </div>

    <p>${s.nome} ${s.cognome}</p>
    <p>${s.indirizzo}</p>

    <div id="status_${s.code}"></div>

  </div>
  `;

  moveTruck(s.code, s.createdAt);
}

/* 🚚 AUTO + MANUAL + STOP */
function moveTruck(code, start){

  const truck = document.getElementById("truck_" + code);
  const bar = document.getElementById("bar_" + code);
  const status = document.getElementById("status_" + code);

  function update(){

    let s = shipments[code];

    // ⛔ STOP
    if(s.status === "stopped"){
      status.innerHTML = "⚠️ Il tuo ordine è stato sospeso";
      return;
    }

    let progress;

    if(auto){

      let hours = (Date.now() - start) / 3600000;
      let day = Math.floor(hours / 24);
      if(day > 5) day = 5;

      progress = (day / 5) * 100;

    } else {
      progress = manualProgress;
    }

    truck.style.left = progress + "%";
    bar.style.width = progress + "%";

    requestAnimationFrame(update);
  }

  update();
}

/* 🎛 CONTROL */
function setManual(){
  auto = false;
  manualProgress = document.getElementById("pos").value;
}

function setAuto(){
  auto = true;
}

</script>

</body>
</html>
